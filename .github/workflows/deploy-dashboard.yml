name: Deploy Dashboard Worker

# Deploys the MR ROBOT Dashboard (React SPA + Hono API) to Cloudflare Workers.
# Uses a combined worker approach: static assets are embedded into _worker.js,
# bypassing CF Pages (which had broken direct-upload support in this account).
#
# Required GitHub repo secrets:
#   - CF_PAGES_API_TOKEN   (cfat_... token with Workers:Edit permission)
#   - CLOUDFLARE_ACCOUNT_ID
#   - NEON_DATABASE_URL

on:
  push:
    branches: [main]
    paths:
      - "artifacts/dashboard/**"
      - "lib/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build dashboard
        run: |
          BASE_PATH="/" NODE_ENV=production \
            pnpm --filter @workspace/dashboard run build

      - name: Bundle combined Worker (static assets + API)
        run: node artifacts/dashboard/scripts/bundle-worker.mjs

      - name: Deploy to Cloudflare Workers
        env:
          CF_TOKEN: ${{ secrets.CF_PAGES_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: node artifacts/dashboard/scripts/deploy-worker.mjs
